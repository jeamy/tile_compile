# OSC Referenzprofil: sehr helle / saturierte Sterne (z.B. Vega, Deneb, Altair)
# Vollstaendig, alle Optionen; Fokus auf stabile Tile-Naehte trotz grossem Sternhalo.
# Ziel: quadratische Stern-/Halostrukturen durch konservativere Tile-Rekonstruktion vermeiden.

run_dir: ./run_very_bright_star_anti_seam
log_level: info # trace|debug|info|warn|error

pipeline:
  mode: production # production|test
  abort_on_fail: false # true => Lauf bei kritischem Phasenfehler sofort beenden

output:
  registered_dir: registered # Ausgabeordner fuer registrierte Frames
  write_registered_frames: true # registrierte Einzelbilder speichern
  crop_to_nonzero_bbox: true # finalen Stack auf Bounding Box nicht-null Pixel zuschneiden

data:
  # image_width: 3840 # optional: aus FITS Header ableiten lassen oder fix setzen
  # image_height: 2160 # optional: aus FITS Header ableiten lassen oder fix setzen
  # color_mode: OSC # optional, wird i.d.R. aus Header erkannt
  # bayer_pattern: GBRG # optional, wird i.d.R. aus Header erkannt
  linear_required: true # nur lineare Daten verarbeiten

input:
  pattern: ./data/*.fits # Input-Glob fuer Rohframes
  sort: numeric # numeric|lexicographic
  max_frames: 0 # 0 = alle; >0 limitiert Inputanzahl

linearity:
  enabled: true # Linearity-Check aktiv
  max_frames: 8 # max. Frames fuer den Check
  min_overall_linearity: 0.9 # Mindestscore fuer linearity gate
  strictness: moderate # bei sehr hellen Sternen nicht unnoetig verwerfend

calibration:
  use_bias: false # Bias-Korrektur aktivieren
  use_dark: false # Dark-Korrektur aktivieren
  use_flat: false # Flat-Korrektur aktivieren
  bias_use_master: false # vorhandenes Master-Bias direkt nutzen
  dark_use_master: false # vorhandenes Master-Dark direkt nutzen
  flat_use_master: false # vorhandenes Master-Flat direkt nutzen
  dark_auto_select: true # passendes Dark automatisch waehlen
  dark_match_exposure_tolerance_percent: 8.0 # Toleranz bei Dark-Auswahl
  dark_match_use_temp: false # Temperaturmatching fuer Darks
  dark_match_temp_tolerance_c: 3.0 # Temperaturtoleranz in Grad C
  bias_dir: "" # Verzeichnis mit Bias-Frames
  darks_dir: "" # Verzeichnis mit Dark-Frames
  flats_dir: "" # Verzeichnis mit Flat-Frames
  bias_master: "" # Pfad zu Master-Bias
  dark_master: "" # Pfad zu Master-Dark
  flat_master: "" # Pfad zu Master-Flat
  pattern: "*.fit;*.fits;*.fts;*.fit.fz;*.fits.fz;*.fts.fz" # Dateimaske fuer Kalibrierdaten (inkl. komprimierte .fz)

assumptions:
  pipeline_profile: practical # practical|strict
  frames_min: 30 # Untergrenze fuer dieses Profil
  frames_optimal: 300 # praxisnahes Ziel fuer robuste Statistik
  frames_reduced_threshold: 150 # Full-Mode ab 150, darunter Reduced/Emergency
  exposure_time_tolerance_percent: 8.0 # Toleranz fuer Input-Konsistenz
  reduced_mode_skip_clustering: true # Reduced/Emergency ohne Clustering
  reduced_mode_cluster_range: [3, 10] # Cluster-Range in Reduced-Betrieb

normalization:
  enabled: true # fuer Methodik v3.x verpflichtend
  mode: background # background|median
  per_channel: true # bei OSC pro Bayer-Kanal normalisieren

registration:
  engine: triangle_star_matching # triangle_star_matching|star_similarity|hybrid_phase_ecc
  enable_star_pair_fallback: true
  allow_rotation: true # robust fuer Alt/Az und rotierende Felder
  star_topk: 180 # trotz dominanter heller Sterne genug schwaechere Sterne einbeziehen
  star_min_inliers: 5 # Mindestzahl Inlier fuer Stern-Matching
  star_inlier_tol_px: 4.0 # toleranter fuer Feldrotation/Restresiduen
  star_dist_bin_px: 5.0 # Distanz-Binning fuer Sternpaare
  reject_outliers: true # globale Registrierungs-Ausreisser verwerfen
  reject_cc_min_abs: 0.30 # bei hellen Halo-/Gradientfeldern nicht zu streng
  reject_cc_mad_multiplier: 4.0 # robuster CC-Schwellenfaktor
  reject_shift_px_min: 100.0 # Alt/Az: grosse Shifts durch Feldrotation sind normal
  reject_shift_median_multiplier: 5.0 # weite Shift-Verteilung zulassen
  reject_scale_min: 0.92 # minimale erlaubte Similarity-Skalierung
  reject_scale_max: 1.08 # maximale erlaubte Similarity-Skalierung

dithering:
  enabled: true # true bei aktivem Dithering waehrend Aufnahme
  min_shift_px: 0.7 # Schwellwert, ab dem ein Shift als Dither-Schritt gezaehlt wird

tile_denoise:
  soft_threshold:
    enabled: false # bei grossen Halos keine zusaetzliche tile-lokale Dynamik erzeugen
    blur_kernel: 31 # Hintergrundschaetzer-Kernel (ungerade)
    alpha: 1.2 # konservativer Schwellwert, falls aktiviert
    skip_star_tiles: true # sternreiche Tiles vom Denoise ausnehmen
  wiener:
    enabled: false # fuer sehr helle Sterne konservativ deaktiviert
    snr_threshold: 5.0 # oberhalb keine Wiener-Filterung
    q_min: -0.5 # untere Strukturqualitaetsgrenze
    q_max: 1.0 # obere Strukturqualitaetsgrenze
    q_step: 0.1 # Schrittweite in q-Optimierung
    min_snr: 2.0 # minimaler SNR fuer stabile Schaetzung
    max_iterations: 10 # Iterationslimit der Wiener-Optimierung

chroma_denoise:
  enabled: true # Farbrausch-Reduktion fuer OSC-Daten
  color_space: ycbcr_linear # ycbcr_linear|opponent_linear
  apply_stage: post_stack_linear # pre_stack_tiles|post_stack_linear
  protect_luma: true # Luma/Struktur besser erhalten
  luma_guard_strength: 0.85 # Halokanten staerker schuetzen
  star_protection:
    enabled: true
    threshold_sigma: 2.0
    dilate_px: 4
  structure_protection:
    enabled: true
    gradient_percentile: 90
  chroma_wavelet:
    enabled: true
    levels: 3
    threshold_scale: 1.0
    soft_k: 1.0
  chroma_bilateral:
    enabled: true
    sigma_spatial: 1.2
    sigma_range: 0.025
  blend:
    mode: chroma_only
    amount: 0.70
  # Preset-Hinweis:
  # conservative: amount 0.65, threshold_scale 1.0, sigma_range 0.025
  # balanced:     amount 0.85, threshold_scale 1.25, sigma_range 0.035
  # aggressive:   amount 0.95, threshold_scale 1.5, sigma_range 0.05

global_metrics:
  adaptive_weights: false # Extremgewichte um saturierte Halos vermeiden
  weight_exponent_scale: 1.0 # geringere Spreizung reduziert lokale Dominanz
  weights:
    background: 0.45 # Halo-/Gradientstabilitaet etwas wichtiger gewichten
    noise: 0.25 # Rauschmetrik weniger dominant
    gradient: 0.30 # Struktur/Gradientenenergie
  clamp: [-1.5, 1.5] # enges Clipping reduziert Gewichtsausreisser

tile:
  size_factor: 40 # groessere Tiles fuer ruhigere Rekonstruktion um helle Sterne
  min_size: 128 # groesseres Minimum fuer stabilere OLA-Transitionen
  max_divisor: 5 # weniger Unterteilung reduziert sichtbare Kachelstruktur
  overlap_fraction: 0.45 # mehr Ueberlappung fuer weichere Tile-Naehte
  star_min_count: 12 # hoherer Stern-Schwellenwert fuer robustere STAR-Klassifikation

local_metrics:
  clamp: [-1.5, 1.5] # engeres Clipping fuer lokale z-Score-Metriken
  star_mode:
    weights:
      fwhm: 0.7 # Schwerpunkt auf Sternprofil statt aggressivem Kontrast
      roundness: 0.2 # Gewicht Sternrundheit
      contrast: 0.1 # Kontrast geringer gewichten, da saturierte Kerne instabil sind
  structure_mode:
    metric_weight: 0.6 # Strukturmetrik leicht reduziert
    background_weight: 0.4 # lokaler Hintergrund wichtiger bei Halos

synthetic:
  weighting: global # global|tile_weighted; vermeidet lokale Dominanz einzelner Tiles
  frames_min: 4 # Mindestframes pro Cluster fuer Synthetic
  frames_max: 20 # Obergrenze erzeugter Synthetic-Frames
  clustering:
    mode: kmeans # kmeans|quantile
    cluster_count_range: [3, 12] # [k_min, k_max] fuer kleinere Datensaetze

debayer: true # OSC-Mosaik am Ende in RGB debayern

astrometry:
  enabled: true # WCS-Solve aktiv
  astap_bin: "" # leer => Systempfad
  astap_data_dir: /media/data/Astro/astap # ASTAP-Datenverzeichnis
  search_radius: 183 # Suchradius in Grad

bge:
  enabled: false # nur aktivieren, wenn grossflaechige Gradienten zusaetzlich vorhanden sind
  autotune:
    enabled: false # optionales deterministisches BGE-Autotuning
    strategy: conservative # conservative | extended
    max_evals: 24 # harte Obergrenze getesteter Kandidaten
    holdout_fraction: 0.25 # CV-Anteil, gueltig in [0.05, 0.50]
    alpha_flatness: 0.25 # Gewicht E_flat im Ziel J
    beta_roughness: 0.10 # Gewicht E_rough im Ziel J

  sample_quantile: 0.15 # defensiv: eher sky-nahe Samples
  structure_thresh_percentile: 0.85 # Halo-Bereiche eher aus BGE-Samples ausschliessen
  min_tiles_per_cell: 3 # Mindestanzahl Tiles pro Grid-Cell
  min_valid_sample_fraction_for_apply: 0.30 # Mindestanteil valider robuster Tile-Samples je Kanal
  min_valid_samples_for_apply: 96 # absolute Untergrenze robuster Tile-Samples je Kanal
  mask:
    star_dilate_px: 10 # helle Sternkerne/Halos grosszuegiger maskieren
    sat_dilate_px: 10
  grid:
    N_g: 32
    G_min_px: 64
    G_max_fraction: 0.25
    insufficient_cell_strategy: discard # discard | nearest | radius_expand
  fit:
    method: rbf # poly | spline | bicubic | rbf | modeled_mask_mesh
    robust_loss: huber # huber | tukey
    huber_delta: 1.5
    irls_max_iterations: 10
    irls_tolerance: 1e-4
    polynomial_order: 2
    rbf_phi: multiquadric # thinplate | multiquadric | gaussian
    rbf_mu_factor: 1.5
    rbf_lambda: 1e-2
    rbf_epsilon: 1.0

pcc:
  enabled: true # Photometrische Farbkalibrierung aktiv
  source: siril # auto|siril|vizier_gaia|vizier_apass
  mag_limit: 14 # maximal beruecksichtigte Sternhelligkeit
  mag_bright_limit: 4 # sehr helle Referenzsterne frueher ausschliessen
  aperture_radius_px: 8 # Photometrie-Apertur
  annulus_inner_px: 10 # Hintergrundring innen
  annulus_outer_px: 16 # Hintergrundring aussen
  min_stars: 20 # etwas robusteres Sample fuer Felder mit dominanter heller Quelle
  sigma_clip: 2.0 # konservativeres Sigma-Clipping
  siril_catalog_dir: "" # leer => Standardkatalogpfad
  background_model: plane # median | plane
  max_condition_number: 2.5 # strengere Stabilitaetsgrenze fuer PCC-Matrix
  max_residual_rms: 0.50 # maximale robuste Fit-Abweichung
  radii_mode: auto_fwhm # fixed | auto_fwhm
  aperture_fwhm_mult: 1.8
  annulus_inner_fwhm_mult: 3.0
  annulus_outer_fwhm_mult: 5.0
  min_aperture_px: 4.0
  apply_attenuation: false
  chroma_strength: 0.8 # Farbkalibrierung etwas defensiver anwenden
  k_max: 2.0 # begrenzt extreme PCC-Skalierung

stacking:
  method: rej # rej|average
  sigma_clip:
    sigma_low: 1.8 # moderater Outlier-Schutz
    sigma_high: 1.8 # symmetrisch
    max_iters: 3 # maximale Clip-Iterationen
    min_fraction: 0.4 # bei Feldrotation/Wolken nicht zu streng
  cluster_quality_weighting:
    enabled: false # konservativ ohne zusaetzliche Clustergewichtung
    kappa_cluster: 1.0 # Exponentfaktor fuer Clusterqualitaet Q_k
    cap_enabled: true # optional: begrenzt Dominanz einzelner Cluster
    cap_ratio: 10.0 # konservativer als Default
  output_stretch: false # optionales Display-Stretch (Post)
  cosmetic_correction: true # optionale Kosmetik (Post)
  cosmetic_correction_sigma: 4.0 # Hotpixel-Schwelle in MAD-Sigma
  per_frame_cosmetic_correction: true # fixe Sensordefekte frueh entfernen
  per_frame_cosmetic_correction_sigma: 2.5 # Sigma-Schwelle fuer per-frame Korrektur

validation:
  min_fwhm_improvement_percent: 0.0 # nicht auf FWHM-Gewinn versteifen
  max_background_rms_increase_percent: 1.0 # Hintergrund darf kaum schlechter werden
  min_tile_weight_variance: 0.03 # bei homogenem Datensatz niedriger erwartbar
  require_no_tile_pattern: true # Grid-Artefakte muessen ausbleiben

runtime_limits:
  parallel_workers: 4 # konservativer Default fuer stabile Last
  memory_budget: 2048 # MiB Budget fuer OSC-Worker-Cap in Tile-Rekonstruktion
  tile_analysis_max_factor_vs_stack: 3.0 # Guardrail Laufzeit Tile-Analyse
  hard_abort_hours: 6.0 # harte Laufzeitgrenze
  allow_emergency_mode: true
