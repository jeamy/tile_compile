


run_dir: ./run_very_bright_star_anti_seam
log_level: info
pipeline:
  mode: production
  abort_on_fail: false
output:
  registered_dir: registered
  write_registered_frames: true
  crop_to_nonzero_bbox: true
data:
  linear_required: true
input:
  pattern: ./data/*.fits
  sort: numeric
  max_frames: 0
linearity:
  enabled: true
  max_frames: 8
  min_overall_linearity: 0.9
  strictness: moderate
calibration:
  use_bias: false
  use_dark: false
  use_flat: false
  bias_use_master: false
  dark_use_master: false
  flat_use_master: false
  dark_auto_select: true
  dark_match_exposure_tolerance_percent: 8.0
  dark_match_use_temp: false
  dark_match_temp_tolerance_c: 3.0
  bias_dir: ''
  darks_dir: ''
  flats_dir: ''
  bias_master: ''
  dark_master: ''
  flat_master: ''
  pattern: '*.fit;*.fits;*.fts;*.fit.fz;*.fits.fz;*.fts.fz'
assumptions:
  pipeline_profile: practical
  frames_min: 30
  frames_optimal: 300
  frames_reduced_threshold: 150
  exposure_time_tolerance_percent: 8.0
  reduced_mode_skip_clustering: true
  reduced_mode_cluster_range:
  - 3
  - 10
normalization:
  enabled: true
  mode: background
  per_channel: true
registration:
  engine: robust_phase_ecc
  enable_star_pair_fallback: true
  allow_rotation: true
  star_topk: 180
  star_min_inliers: 5
  star_inlier_tol_px: 4
  star_dist_bin_px: 5.0
  reject_outliers: true
  reject_cc_min_abs: 0.3
  reject_cc_mad_multiplier: 4.0
  reject_shift_px_min: 120
  reject_shift_median_multiplier: 5
  reject_scale_min: 0.92
  reject_scale_max: 1.08
dithering:
  enabled: true
  min_shift_px: 0.7
tile_denoise:
  soft_threshold:
    enabled: false
    blur_kernel: 31
    alpha: 1.2
    skip_star_tiles: true
  wiener:
    enabled: false
    snr_threshold: 5.0
    q_min: -0.5
    q_max: 1.0
    q_step: 0.1
    min_snr: 2.0
    max_iterations: 10
chroma_denoise:
  enabled: true
  color_space: ycbcr_linear
  apply_stage: post_stack_linear
  protect_luma: true
  luma_guard_strength: 0.85
  star_protection:
    enabled: true
    threshold_sigma: 2.0
    dilate_px: 4
  structure_protection:
    enabled: true
    gradient_percentile: 90
  chroma_wavelet:
    enabled: true
    levels: 3
    threshold_scale: 1.0
    soft_k: 1.0
  chroma_bilateral:
    enabled: true
    sigma_spatial: 1.2
    sigma_range: 0.025
  blend:
    mode: chroma_only
    amount: 0.7
global_metrics:
  adaptive_weights: false
  weight_exponent_scale: 1.0
  weights:
    background: 0.45
    noise: 0.25
    gradient: 0.3
  clamp:
  - -1.5
  - 1.5
tile:
  size_factor: 40
  min_size: 128
  max_divisor: 5
  overlap_fraction: 0.45
  star_min_count: 12
local_metrics:
  clamp:
  - -1.5
  - 1.5
  star_mode:
    weights:
      fwhm: 0.7
      roundness: 0.2
      contrast: 0.1
  structure_mode:
    metric_weight: 0.6
    background_weight: 0.4
synthetic:
  weighting: global
  frames_min: 4
  frames_max: 20
  clustering:
    mode: kmeans
    cluster_count_range:
    - 3
    - 12
debayer: true
astrometry:
  enabled: true
  astap_bin: ''
  astap_data_dir: /media/data/Astro/astap
  search_radius: 183
bge:
  enabled: true
  autotune:
    enabled: false
    strategy: conservative
    max_evals: 24
    holdout_fraction: 0.25
    alpha_flatness: 0.25
    beta_roughness: 0.1
  sample_quantile: 0.15
  structure_thresh_percentile: 0.8
  min_tiles_per_cell: 3
  min_valid_sample_fraction_for_apply: 0.3
  min_valid_samples_for_apply: 96
  mask:
    star_dilate_px: 6
    sat_dilate_px: 10
  grid:
    N_g: 32
    G_min_px: 64
    G_max_fraction: 0.25
    insufficient_cell_strategy: discard
  fit:
    method: rbf
    robust_loss: huber
    huber_delta: 1.5
    irls_max_iterations: 10
    irls_tolerance: 1e-4
    polynomial_order: 2
    rbf_phi: multiquadric
    rbf_mu_factor: 1.5
    rbf_lambda: 1e-2
    rbf_epsilon: 1.0
pcc:
  enabled: true
  source: siril
  mag_limit: 14
  mag_bright_limit: 6
  aperture_radius_px: 8
  annulus_inner_px: 10
  annulus_outer_px: 16
  min_stars: 20
  sigma_clip: 2.7
  siril_catalog_dir: ''
  background_model: plane
  max_condition_number: 2.5
  max_residual_rms: 0.5
  radii_mode: auto_fwhm
  aperture_fwhm_mult: 1.8
  annulus_inner_fwhm_mult: 3.0
  annulus_outer_fwhm_mult: 5.0
  min_aperture_px: 4.0
  apply_attenuation: false
  chroma_strength: 0.8
  k_max: 2.4
stacking:
  method: rej
  sigma_clip:
    sigma_low: 1.8
    sigma_high: 1.8
    max_iters: 3
    min_fraction: 0.4
  cluster_quality_weighting:
    enabled: false
    kappa_cluster: 1.0
    cap_enabled: true
    cap_ratio: 10.0
  output_stretch: false
  cosmetic_correction: true
  cosmetic_correction_sigma: 4.0
  per_frame_cosmetic_correction: true
  per_frame_cosmetic_correction_sigma: 2.5
validation:
  min_fwhm_improvement_percent: 0.0
  max_background_rms_increase_percent: 1.0
  min_tile_weight_variance: 0.03
  require_no_tile_pattern: true
runtime_limits:
  parallel_workers: 4
  memory_budget: 2048
  tile_analysis_max_factor_vs_stack: 3.0
  hard_abort_hours: 6.0
  allow_emergency_mode: true
