assumptions:
  exposure_time_tolerance_percent: 8
  frames_min: 30
  frames_optimal: 300
  frames_reduced_threshold: 120
  pipeline_profile: practical
  reduced_mode_cluster_range:
    - 3
    - 10
  reduced_mode_skip_clustering: true
astrometry:
  astap_bin: ""
  astap_data_dir: /media/data/Astro/astap
  enabled: true
  search_radius: 183
bge:
  autotune:
    alpha_flatness: 0.34999999999999998
    beta_roughness: 0.080000000000000002
    enabled: true
    holdout_fraction: 0.20000000000000001
    max_evals: 32
    strategy: extended
  enabled: true
  fit:
    huber_delta: 1.5
    irls_max_iterations: 10
    irls_tolerance: 0.0001
    method: rbf
    polynomial_order: 2
    rbf_epsilon: 0.80000000000000004
    rbf_lambda: 0.02
    rbf_mu_factor: 1.6000000000000001
    rbf_phi: multiquadric
    robust_loss: huber
  grid:
    G_max_fraction: 0.25
    G_min_px: 64
    N_g: 36
    insufficient_cell_strategy: radius_expand
  mask:
    sat_dilate_px: 5
    star_dilate_px: 5
  min_tiles_per_cell: 3
  min_valid_sample_fraction_for_apply: 0.29999999999999999
  min_valid_samples_for_apply: 96
  sample_quantile: 0.17999999999999999
  structure_thresh_percentile: 0.90000000000000002
calibration:
  bias_dir: ""
  bias_master: ""
  bias_use_master: false
  dark_auto_select: true
  dark_master: ""
  dark_match_exposure_tolerance_percent: 8
  dark_match_temp_tolerance_c: 3
  dark_match_use_temp: false
  dark_use_master: false
  darks_dir: ""
  flat_master: ""
  flat_use_master: false
  flats_dir: ""
  pattern: "*.fit;*.fits;*.fts;*.fit.fz;*.fits.fz;*.fts.fz"
  use_bias: false
  use_dark: false
  use_flat: false
chroma_denoise:
  apply_stage: post_stack_linear
  blend:
    amount: 0.75
    mode: chroma_only
  chroma_bilateral:
    enabled: true
    sigma_range: 0.059999999999999998
    sigma_spatial: 2
  chroma_wavelet:
    enabled: true
    levels: 4
    soft_k: 1.1000000000000001
    threshold_scale: 1.6000000000000001
  color_space: ycbcr_linear
  enabled: true
  luma_guard_strength: 0.92000000000000004
  protect_luma: true
  star_protection:
    dilate_px: 3
    enabled: true
    threshold_sigma: 3
  structure_protection:
    enabled: true
    gradient_percentile: 94
data:
  color_mode: OSC
  linear_required: true
debayer: true
dithering:
  enabled: true
  min_shift_px: 0.69999999999999996
global_metrics:
  adaptive_weights: true
  clamp:
    - -3
    - 3
  weight_exponent_scale: 1.2
  weights:
    background: 0.40000000000000002
    gradient: 0.25
    noise: 0.34999999999999998
input:
  max_frames: 0
  pattern: ./data/*.fits
  sort: numeric
linearity:
  enabled: true
  max_frames: 8
  min_overall_linearity: 0.90000000000000002
  strictness: moderate
local_metrics:
  clamp:
    - -3
    - 3
  star_mode:
    weights:
      contrast: 0.20000000000000001
      fwhm: 0.59999999999999998
      roundness: 0.20000000000000001
  structure_mode:
    background_weight: 0.29999999999999999
    metric_weight: 0.69999999999999996
log_level: info
normalization:
  enabled: true
  mode: background
  per_channel: true
output:
  crop_to_nonzero_bbox: true
  registered_dir: registered
  write_registered_frames: true
pcc:
  annulus_inner_fwhm_mult: 3
  annulus_inner_px: 10
  annulus_outer_fwhm_mult: 5
  annulus_outer_px: 16
  aperture_fwhm_mult: 1.8
  aperture_radius_px: 8
  apply_attenuation: false
  background_model: plane
  chroma_strength: 0.84999999999999998
  enabled: true
  k_max: 2.3999999999999999
  mag_bright_limit: 6
  mag_limit: 14
  max_condition_number: 3
  max_residual_rms: 0.37
  min_aperture_px: 4
  min_stars: 10
  radii_mode: auto_fwhm
  sigma_clip: 2.5
  siril_catalog_dir: ""
  source: siril
pipeline:
  abort_on_fail: false
  mode: production
registration:
  allow_rotation: true
  enable_star_pair_fallback: true
  engine: triangle_star_matching
  reject_cc_mad_multiplier: 4
  reject_cc_min_abs: 0.29999999999999999
  reject_outliers: true
  reject_scale_max: 1.0800000000000001
  reject_scale_min: 0.92000000000000004
  reject_shift_median_multiplier: 5
  reject_shift_px_min: 100
  star_dist_bin_px: 5
  star_inlier_tol_px: 4
  star_min_inliers: 4
  star_topk: 150
run_dir: ./run_m31_background_gradient_balanced
runtime_limits:
  allow_emergency_mode: true
  hard_abort_hours: 6
  memory_budget: 2048
  parallel_workers: 8
  tile_analysis_max_factor_vs_stack: 3
scenario_profile:
  gui2_scenarios:
    - osc
    - m31
    - galaxy
    - background_gradient
    - broadband
  id: m31_background_gradient_balanced
  intent: M31/OSC mit Fokus auf Gradientreduktion bei moeglichst neutraler PCC-Farbkalibrierung ohne Gruenstich.
  priority: balanced_color_and_background
  recommended_for:
    - M31 / grosse diffuse Galaxien mit Hintergrundgradient
    - wenn ein nebula-orientiertes Chroma-Suppression-Preset die Galaxie zu gruen oder zu entsaettigt macht
  title: M31 Background Gradient Balanced
stacking:
  cluster_quality_weighting:
    cap_enabled: true
    cap_ratio: 20
    enabled: false
    kappa_cluster: 1
  cosmetic_correction: true
  cosmetic_correction_sigma: 4
  method: rej
  output_stretch: true
  per_frame_cosmetic_correction: true
  per_frame_cosmetic_correction_sigma: 2.5
  sigma_clip:
    max_iters: 4
    min_fraction: 0.40000000000000002
    sigma_high: 1.8
    sigma_low: 1.8
  tile_seam_harmonization:
    enabled: true
synthetic:
  clustering:
    cluster_count_range:
      - 3
      - 12
    mode: kmeans
  frames_max: 20
  frames_min: 4
  weighting: tile_weighted
tile:
  max_divisor: 6
  min_size: 48
  overlap_fraction: 0.29999999999999999
  size_factor: 24
  star_min_count: 5
tile_denoise:
  soft_threshold:
    alpha: 1.3999999999999999
    blur_kernel: 21
    enabled: true
    skip_star_tiles: true
  wiener:
    enabled: true
    max_iterations: 10
    min_snr: 2
    q_max: 1
    q_min: -0.5
    q_step: 0.10000000000000001
    snr_threshold: 4
validation:
  max_background_rms_increase_percent: 2
  min_fwhm_improvement_percent: 3
  min_tile_weight_variance: 0.050000000000000003
  require_no_tile_pattern: true