name: Release tile_compile_cpp Standalone

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (z.B. v1.2.3)"
        required: true
  workflow_call:
    inputs:
      tag:
        description: "Release tag (z.B. v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-tile-compile-cpp-${{ inputs.tag || github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  meta:
    name: Resolve Release Metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Resolve tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_call" ]]; then
            TAG="${{ inputs.tag }}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          TAG="${TAG#refs/tags/}"
          if [[ -z "$TAG" ]]; then
            echo "Tag konnte nicht ermittelt werden." >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

  package-linux:
    name: Package Linux Standalone (Ubuntu 20.04 Docker)
    runs-on: ubuntu-24.04
    needs: meta
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and package (Ubuntu 20.04 Docker script)
        shell: bash
        run: |
          set -euo pipefail
          bash tile_compile_cpp/build_linux_release_docker_ubuntu2004.sh

      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.meta.outputs.tag }}"
          mkdir -p artifacts
          SRC_ZIP="tile_compile_cpp/dist/tile_compile_cpp-linux-release.zip"
          SRC_APPIMAGE="tile_compile_cpp/dist/tile_compile_cpp-linux-x86_64.AppImage"
          test -f "$SRC_ZIP"
          test -f "$SRC_APPIMAGE"
          cp "$SRC_ZIP" "artifacts/tile_compile_cpp-linux-${TAG}.zip"
          cp "$SRC_APPIMAGE" "artifacts/tile_compile_cpp-linux-${TAG}.AppImage"
          ls -la artifacts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tile_compile_cpp-linux-${{ needs.meta.outputs.tag }}
          path: |
            artifacts/tile_compile_cpp-linux-${{ needs.meta.outputs.tag }}.zip
            artifacts/tile_compile_cpp-linux-${{ needs.meta.outputs.tag }}.AppImage

  package-macos:
    name: Package macOS Standalone (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            suffix: macos14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          brew update
          brew install cmake ninja pkg-config eigen opencv cfitsio yaml-cpp nlohmann-json openssl qt
          echo "$(brew --prefix qt)/bin" >> "$GITHUB_PATH"

      - name: Build and package (release script)
        shell: bash
        run: |
          set -euo pipefail
          bash tile_compile_cpp/build_macos_release.sh

      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.meta.outputs.tag }}"
          SUFFIX="${{ matrix.suffix }}"
          mkdir -p artifacts

          APP_BUNDLE="tile_compile_cpp/dist/macos/tile_compile_gui.app"
          if [[ -d "$APP_BUNDLE" ]]; then
            ditto -c -k --sequesterRsrc --keepParent "$APP_BUNDLE" \
              "artifacts/tile_compile_cpp-${SUFFIX}-${TAG}.zip"
          fi

          DMG="tile_compile_cpp/dist/tile_compile_cpp-macos.dmg"
          if [[ -f "$DMG" ]]; then
            cp "$DMG" "artifacts/tile_compile_cpp-${SUFFIX}-${TAG}.dmg"
          fi

          ls -la artifacts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tile_compile_cpp-${{ matrix.suffix }}-${{ needs.meta.outputs.tag }}
          path: artifacts/*
          if-no-files-found: error

  package-windows:
    name: Package Windows Standalone (windows-2022)
    runs-on: windows-2022
    needs: meta
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-eigen3
            mingw-w64-x86_64-opencv
            mingw-w64-x86_64-cfitsio
            mingw-w64-x86_64-yaml-cpp
            mingw-w64-x86_64-nlohmann-json
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-qt6-svg
            mingw-w64-x86_64-ntldd

      - name: Build and package (release script)
        shell: pwsh
        run: |
          $workspaceRoot = "${{ github.workspace }}"
          $script = Join-Path $workspaceRoot "tile_compile_cpp\build_windows_release.bat"
          if (!(Test-Path $script)) {
            throw "Build-Skript nicht gefunden: $script"
          }

          Write-Host "MSYSTEM=$env:MSYSTEM"
          Write-Host "RUNNER_TEMP=$env:RUNNER_TEMP"
          Write-Host "MSYS2_LOCATION=$env:MSYS2_LOCATION"
          $pacmanCmd = Get-Command pacman.exe -ErrorAction SilentlyContinue
          if ($pacmanCmd) {
            Write-Host "pacman.exe in PATH: $($pacmanCmd.Source)"
          } else {
            Write-Host "pacman.exe not in PATH for pwsh step (ok, script does fallback detection)."
          }

          Write-Host "Running: $script"
          & $script
          if ($LASTEXITCODE -ne 0) {
            throw "build_windows_release.bat fehlgeschlagen (ExitCode=$LASTEXITCODE)"
          }

          $expectedRoots = @(
            "$workspaceRoot\tile_compile_cpp\dist",
            "$workspaceRoot\tile_compile_cpp\build\windows-release",
            "C:\windows-tile-compile-build"
          )
          $anyRootExists = $false
          foreach ($root in $expectedRoots) {
            if (Test-Path $root) {
              $anyRootExists = $true
              break
            }
          }
          if (-not $anyRootExists) {
            throw "Build-Skript lief ohne Fehlercode, aber es wurden keine erwarteten Output-Ordner erzeugt."
          }

      - name: Smoke test packaged runner/cli
        shell: pwsh
        run: |
          $workspaceRoot = "${{ github.workspace }}"
          $searchRoots = @(
            "$workspaceRoot\tile_compile_cpp\dist",
            "$workspaceRoot\tile_compile_cpp\build\windows-release\dist",
            "$workspaceRoot\tile_compile_cpp\build\windows-release",
            "C:\windows-tile-compile-build\dist",
            "C:\windows-tile-compile-build"
          ) | Select-Object -Unique

          $runner = $searchRoots |
            Where-Object { Test-Path $_ } |
            ForEach-Object { Get-ChildItem -Path $_ -Recurse -File -Filter "tile_compile_runner.exe" -ErrorAction SilentlyContinue } |
            Select-Object -First 1 -ExpandProperty FullName

          $cli = $searchRoots |
            Where-Object { Test-Path $_ } |
            ForEach-Object { Get-ChildItem -Path $_ -Recurse -File -Filter "tile_compile_cli.exe" -ErrorAction SilentlyContinue } |
            Select-Object -First 1 -ExpandProperty FullName

          if (!$runner) { throw "tile_compile_runner.exe nicht gefunden." }
          if (!$cli) { throw "tile_compile_cli.exe nicht gefunden." }

          Write-Host "Smoke test runner: $runner --help"
          & $runner --help *> $null
          $runnerExit = $LASTEXITCODE
          Write-Host "runner exit code: $runnerExit"
          if ($runnerExit -eq -1073741515 -or $runnerExit -eq 3221225781) {
            throw "Runner Loader-Fehler 0xC0000135 (fehlende DLL)."
          }

          Write-Host "Smoke test cli: $cli --help"
          & $cli --help *> $null
          $cliExit = $LASTEXITCODE
          Write-Host "cli exit code: $cliExit"
          if ($cliExit -eq -1073741515 -or $cliExit -eq 3221225781) {
            throw "CLI Loader-Fehler 0xC0000135 (fehlende DLL)."
          }

      - name: Collect artifacts
        shell: pwsh
        run: |
          $Tag = "${{ needs.meta.outputs.tag }}"
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          $workspaceRoot = "${{ github.workspace }}"
          $searchRoots = @(
            "$workspaceRoot\tile_compile_cpp\dist",
            "$workspaceRoot\tile_compile_cpp\build\windows-release\dist",
            "$workspaceRoot\tile_compile_cpp\build\windows-release",
            "C:\windows-tile-compile-build\dist",
            "C:\windows-tile-compile-build"
          ) | Select-Object -Unique

          Write-Host "Diagnostic listing for known output roots:"
          $searchRoots | ForEach-Object {
            if (Test-Path $_) {
              Write-Host "  found: $_"
              Get-ChildItem -Recurse -Force $_ -ErrorAction SilentlyContinue | Select-Object FullName, Length | Format-Table -AutoSize
            } else {
              Write-Host "  missing: $_"
            }
          }

          $zipName = "tile_compile_cpp-windows-release.zip"
          $zipCandidates = @()
          foreach ($root in $searchRoots) {
            $zipCandidates += "$root\$zipName"
            $zipCandidates += "$root\windows\$zipName"
          }
          $zipCandidates = $zipCandidates | Select-Object -Unique
          $src = $zipCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (!$src) {
            $src = $searchRoots `
              | Where-Object { Test-Path $_ } `
              | ForEach-Object { Get-ChildItem -Path $_ -Recurse -File -Filter $zipName -ErrorAction SilentlyContinue } `
              | Select-Object -First 1 -ExpandProperty FullName
          }

          if (!$src) {
            $distDir = $searchRoots `
              | Where-Object { Test-Path $_ } `
              | ForEach-Object { Get-ChildItem -Path $_ -Recurse -File -Filter "tile_compile_gui.exe" -ErrorAction SilentlyContinue } `
              | ForEach-Object { Split-Path (Split-Path $_.FullName -Parent) -Parent } `
              | Where-Object { Test-Path "$_\bin\tile_compile_gui.exe" } `
              | Select-Object -First 1

            if ($distDir) {
              $generatedZip = "$workspaceRoot\tile_compile_cpp\dist\$zipName"
              New-Item -ItemType Directory -Path (Split-Path $generatedZip -Parent) -Force | Out-Null
              if (Test-Path $generatedZip) { Remove-Item -Force $generatedZip }
              Write-Host "No prebuilt ZIP found. Creating fallback ZIP from: $distDir"
              Compress-Archive -Path $distDir -DestinationPath $generatedZip -Force
              if (Test-Path $generatedZip) {
                $src = $generatedZip
              }
            }
          }

          if (!$src) {
            Write-Host "No ZIP found in expected candidates:"
            $zipCandidates | ForEach-Object { Write-Host "  - $_" }
            throw "Windows Release ZIP nicht gefunden."
          }

          Write-Host "Using ZIP source: $src"
          Copy-Item $src "artifacts\tile_compile_cpp-windows-$Tag.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tile_compile_cpp-windows-${{ needs.meta.outputs.tag }}
          path: artifacts/tile_compile_cpp-windows-${{ needs.meta.outputs.tag }}.zip

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [meta, package-linux, package-macos, package-windows]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Show downloaded files
        shell: bash
        run: find dist -maxdepth 4 -type f -print

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          (
            cd dist
            find . -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.dmg" -o -name "*.AppImage" \) -print0 \
              | sort -z \
              | xargs -0 sha256sum > SHA256SUMS.txt
          )

      - name: Create / update release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: tile_compile_cpp ${{ needs.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/**/*.zip
            dist/**/*.tar.gz
            dist/**/*.dmg
            dist/**/*.AppImage
            dist/SHA256SUMS.txt
